<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아내를 위한 사진 전송기 ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #fce7f3; /* 옅은 핑크색 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #ec4899; /* 핑크색 */
            margin-bottom: 24px;
            font-size: 24px;
        }

        .upload-box {
            border: 2px dashed #f9a8d4;
            padding: 30px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 24px;
        }

        .upload-box:hover {
            background-color: #fff1f2;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: #ec4899;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        #preview {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>사랑하는 아내를 위해 ❤️</h1>
    
    <label for="photoInput" class="upload-box">
        <span class="icon">📸</span>
        <span id="labelTxt">사진을 선택해 주세요</span>
        <div id="preview"></div>
    </label>
    
    <input type="file" id="photoInput" multiple accept="image/*">
    
    <button class="btn" id="sendBtn">사진 전송하기</button>
    <p class="status" id="status"></p>
</div>

<script>
    const photoInput = document.getElementById('photoInput');
    const labelTxt = document.getElementById('labelTxt');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    photoInput.addEventListener('change', () => {
        const files = photoInput.files;
        if (files.length > 0) {
            labelTxt.textContent = `${files.length}장의 사진이 선택됨`;
            preview.innerHTML = '';
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    preview.appendChild(img);
                }
                reader.readAsDataURL(file);
            }
        }
    });

    sendBtn.addEventListener('click', async () => {
        const files = photoInput.files;
        if (files.length === 0) {
            alert('사진을 먼저 선택해 주세요!');
            return;
        }

        const formData = new FormData();
        for (let file of files) {
            formData.append('photos', file);
        }

        sendBtn.disabled = true;
        sendBtn.textContent = '전송 중... 🚀';
        status.textContent = '사진을 네이버 메일로 보내고 있어요.';

        try {
            const response = await fetch('/send-email', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.textContent = '전송 완료! ❤️ 사랑합니다.';
                status.style.color = '#ec4899';
                photoInput.value = '';
                preview.innerHTML = '';
                labelTxt.textContent = '사진을 선택해 주세요';
            } else {
                const msg = await response.text();
                status.textContent = '전송 실패 😢: ' + msg;
                status.style.color = 'red';
            }
        } catch (error) {
            status.textContent = '서버 연결 오류 😢';
            status.style.color = 'red';
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = '사진 전송하기';
        }
    });
</script>

</body>
</html>
