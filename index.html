<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무민 사진 전송기!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');

        :root {
            --point-pink: #f9a8d4; /* 부드러운 연분홍 */
            --bg-pink: #fdf2f8;
            --text-dark: #374151;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Pretendard', sans-serif;
            /* 무민 배경 이미지 - 더 반투명하게 수정 */
            background-image: linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)), 
                              url('https://wallpapers.com/images/hd/moomin-characters-walking-7p47z9z2z9z2z9z2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            color: var(--text-dark);
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4b5563;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            background: #fff;
        }

        input:focus, textarea:focus {
            border-color: var(--point-pink);
            box-shadow: 0 0 0 3px rgba(249, 168, 212, 0.2);
        }

        /* 즐겨찾기 태그 */
        .favorites {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .fav-tag {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .fav-tag:hover {
            background: var(--bg-pink);
            border-color: var(--point-pink);
        }

        .add-fav {
            font-size: 12px;
            color: #9ca3af;
            cursor: pointer;
            margin-bottom: 10px;
            display: inline-block;
            text-decoration: underline;
        }

        /* 사진 선택 박스 */
        .upload-box {
            border: 2px dashed #d1d5db;
            padding: 30px;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            margin-bottom: 25px;
            display: block;
            background: #f9fafb;
            transition: 0.2s;
        }

        .upload-box:hover {
            border-color: var(--point-pink);
            background: var(--bg-pink);
        }

        .btn {
            background-color: var(--point-pink);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn:hover {
            filter: brightness(0.97);
            transform: translateY(-1px);
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #e5e7eb; cursor: not-allowed; }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
            text-align: center;
            line-height: 1.6;
        }

        #preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>무민 사진 전송기 </h1>

    <!-- 받는 사람 -->
    <div class="input-group">
        <label>받는 사람 (이메일)</label>
        <div class="favorites" id="favoritesList"></div>
        <input type="email" id="recipientEmail" placeholder="example@naver.com">
        <span class="add-fav" id="addFavBtn">+ 현재 주소를 즐겨찾기에 추가</span>
    </div>

    <!-- 제목 & 내용 -->
    <div class="input-group">
        <label>편지 제목</label>
        <input type="text" id="subject" placeholder="제목을 입력해주세요.">
    </div>

    <div class="input-group">
        <label>전하고 싶은 말</label>
        <textarea id="message" rows="3" placeholder="사진과 함께 보낼 메시지를 적어주세요."></textarea>
    </div>
    
    <!-- 사진 선택 -->
    <label for="photoInput" class="upload-box">
        <span style="font-size: 32px;">📸</span><br>
        <span id="labelTxt" style="font-size: 14px; color: #9ca3af; margin-top: 8px; display: block;">사진을 선택해 주세요</span>
        <div id="preview"></div>
    </label>
    <input type="file" id="photoInput" multiple accept="image/*">
    
    <button class="btn" id="sendBtn">사진 전송하기</button>
    <p class="status" id="status"></p>
</div>

<script>
    const photoInput = document.getElementById('photoInput');
    const labelTxt = document.getElementById('labelTxt');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');
    
    const recipientInput = document.getElementById('recipientEmail');
    const subjectInput = document.getElementById('subject');
    const messageInput = document.getElementById('message');
    const favoritesList = document.getElementById('favoritesList');
    const addFavBtn = document.getElementById('addFavBtn');

    // --- 주소록(즐겨찾기) ---
    let favorites = JSON.parse(localStorage.getItem('wife_fav_emails') || '[]');

    function renderFavorites() {
        favoritesList.innerHTML = '';
        favorites.forEach((email, index) => {
            const tag = document.createElement('div');
            tag.className = 'fav-tag';
            tag.innerHTML = `<span>${email.split('@')[0]}</span> <span style="font-size:10px; color:#ccc; margin-left:5px;" onclick="deleteFav(${index}, event)">✕</span>`;
            tag.onclick = () => { recipientInput.value = email; };
            favoritesList.appendChild(tag);
        });
    }

    addFavBtn.onclick = () => {
        const email = recipientInput.value.trim();
        if (email && !favorites.includes(email)) {
            favorites.push(email);
            localStorage.setItem('wife_fav_emails', JSON.stringify(favorites));
            renderFavorites();
        }
    };

    window.deleteFav = (index, event) => {
        event.stopPropagation();
        favorites.splice(index, 1);
        localStorage.setItem('wife_fav_emails', JSON.stringify(favorites));
        renderFavorites();
    };

    renderFavorites();

    // --- 이미지 압축 & 전송 ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 1200;
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', 0.7);
                };
            };
        });
    }

    photoInput.addEventListener('change', () => {
        const files = photoInput.files;
        if (files.length > 0) {
            labelTxt.textContent = `${files.length}장의 사진이 선택됨`;
            preview.innerHTML = '';
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    preview.appendChild(img);
                }
                reader.readAsDataURL(file);
            }
        }
    });

    sendBtn.addEventListener('click', async () => {
        const email = recipientInput.value.trim();
        const files = photoInput.files;

        if (!email) return alert('받는 사람 이메일을 입력해 주세요!');
        if (files.length === 0) return alert('사진을 먼저 선택해 주세요!');

        sendBtn.disabled = true;
        sendBtn.textContent = '용량 최적화 중...';
        status.textContent = '사진을 압축하고 있습니다.';

        const formData = new FormData();
        formData.append('recipientEmail', email);
        formData.append('subject', subjectInput.value.trim());
        formData.append('message', messageInput.value.trim());
        
        for (let i = 0; i < files.length; i++) {
            const compressed = await compressImage(files[i]);
            formData.append('photos', compressed);
        }

        sendBtn.textContent = '전송 중...';
        status.textContent = '네이버 메일로 안전하게 보내고 있습니다.';

        try {
            const response = await fetch('/send-email', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.innerHTML = '성공적으로 보냈습니다! ❤️';
                status.style.color = '#ec4899';
                photoInput.value = '';
                preview.innerHTML = '';
                labelTxt.textContent = '사진을 선택해 주세요';
                subjectInput.value = '';
                messageInput.value = '';
            } else {
                const msg = await response.text();
                status.textContent = '발송 실패: ' + msg;
                status.style.color = 'red';
            }
        } catch (error) {
            status.textContent = '서버 연결 오류 😢';
            status.style.color = 'red';
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = '사진 전송하기';
        }
    });
</script>

</body>
</html>
