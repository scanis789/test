<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아내를 위한 사랑의 사진 편지 ❤️</title>
    <style>
        :root {
            --pink-main: #ec4899;
            --pink-light: #fce7f3;
            --pink-border: #f9a8d4;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--pink-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: var(--pink-main);
            margin-bottom: 20px;
            font-size: 22px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--pink-main);
            font-weight: bold;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--pink-border);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--pink-main);
        }

        /* 즐겨찾기 스타일 */
        .favorites {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .fav-tag {
            background: #fff;
            border: 1px solid var(--pink-border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            color: #555;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .fav-tag:hover {
            background: var(--pink-border);
            color: white;
        }

        .add-fav {
            font-size: 11px;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            margin-bottom: 10px;
            display: inline-block;
        }

        .upload-box {
            border: 2px dashed var(--pink-border);
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            margin-bottom: 20px;
            display: block;
        }

        .upload-box:hover {
            background-color: #fff1f2;
        }

        .btn {
            background-color: var(--pink-main);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }

        .status {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
            text-align: center;
            line-height: 1.5;
        }

        #preview {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }

        .preview-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>사랑의 사진 편지 ❤️</h1>

    <!-- 받는 사람 & 즐겨찾기 -->
    <div class="input-group">
        <label>받는 사람 (이메일)</label>
        <div class="favorites" id="favoritesList">
            <!-- 즐겨찾기 버튼들이 여기에 추가됨 -->
        </div>
        <input type="email" id="recipientEmail" placeholder="example@naver.com">
        <span class="add-fav" id="addFavBtn">+ 현재 주소를 즐겨찾기에 추가</span>
    </div>

    <!-- 제목 & 내용 -->
    <div class="input-group">
        <label>편지 제목</label>
        <input type="text" id="subject" placeholder="오늘의 사진을 보냅니다!">
    </div>

    <div class="input-group">
        <label>전하고 싶은 말</label>
        <textarea id="message" rows="3" placeholder="사진과 함께 보낼 메시지를 적어주세요."></textarea>
    </div>
    
    <!-- 사진 선택 -->
    <label for="photoInput" class="upload-box">
        <span style="font-size: 30px;">📸</span><br>
        <span id="labelTxt" style="font-size: 14px; color: #666;">사진을 선택해 주세요</span>
        <div id="preview"></div>
    </label>
    <input type="file" id="photoInput" multiple accept="image/*">
    
    <button class="btn" id="sendBtn">사진 편지 보내기</button>
    <p class="status" id="status"></p>
</div>

<script>
    const photoInput = document.getElementById('photoInput');
    const labelTxt = document.getElementById('labelTxt');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');
    
    const recipientInput = document.getElementById('recipientEmail');
    const subjectInput = document.getElementById('subject');
    const messageInput = document.getElementById('message');
    const favoritesList = document.getElementById('favoritesList');
    const addFavBtn = document.getElementById('addFavBtn');

    // --- 주소록(즐겨찾기) 기능 ---
    let favorites = JSON.parse(localStorage.getItem('wife_fav_emails') || '[]');

    function renderFavorites() {
        favoritesList.innerHTML = '';
        favorites.forEach((email, index) => {
            const tag = document.createElement('div');
            tag.className = 'fav-tag';
            tag.innerHTML = `<span>${email.split('@')[0]}</span> <span style="font-size:10px; color:#aaa;" onclick="deleteFav(${index}, event)">✕</span>`;
            tag.onclick = () => { recipientInput.value = email; };
            favoritesList.appendChild(tag);
        });
    }

    addFavBtn.onclick = () => {
        const email = recipientInput.value.trim();
        if (email && !favorites.includes(email)) {
            favorites.push(email);
            localStorage.setItem('wife_fav_emails', JSON.stringify(favorites));
            renderFavorites();
        }
    };

    window.deleteFav = (index, event) => {
        event.stopPropagation();
        favorites.splice(index, 1);
        localStorage.setItem('wife_fav_emails', JSON.stringify(favorites));
        renderFavorites();
    };

    renderFavorites();

    // --- 이미지 압축 & 전송 로직 ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 1200;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', 0.7);
                };
            };
        });
    }

    photoInput.addEventListener('change', () => {
        const files = photoInput.files;
        if (files.length > 0) {
            labelTxt.textContent = `${files.length}장의 사진이 선택됨`;
            preview.innerHTML = '';
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    preview.appendChild(img);
                }
                reader.readAsDataURL(file);
            }
        }
    });

    sendBtn.addEventListener('click', async () => {
        const email = recipientInput.value.trim();
        const files = photoInput.files;

        if (!email) return alert('받는 사람 이메일을 입력해 주세요!');
        if (files.length === 0) return alert('사진을 먼저 선택해 주세요!');

        sendBtn.disabled = true;
        sendBtn.textContent = '용량 최적화 중...';
        status.textContent = '사진을 압축하고 있습니다.';

        const formData = new FormData();
        formData.append('recipientEmail', email);
        formData.append('subject', subjectInput.value.trim());
        formData.append('message', messageInput.value.trim());
        
        for (let i = 0; i < files.length; i++) {
            const compressed = await compressImage(files[i]);
            formData.append('photos', compressed);
        }

        sendBtn.textContent = '전송 중...';
        status.textContent = '네이버 메일로 안전하게 보내고 있습니다.';

        try {
            const response = await fetch('/send-email', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.innerHTML = '성공적으로 보냈습니다! ❤️';
                status.style.color = '#ec4899';
                photoInput.value = '';
                preview.innerHTML = '';
                labelTxt.textContent = '사진을 선택해 주세요';
                subjectInput.value = '';
                messageInput.value = '';
            } else {
                const msg = await response.text();
                status.textContent = '발송 실패: ' + msg;
                status.style.color = 'red';
            }
        } catch (error) {
            status.textContent = '서버 연결 오류 😢';
            status.style.color = 'red';
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = '사진 편지 보내기';
        }
    });
</script>

</body>
</html>
