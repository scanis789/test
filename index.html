<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아내를 위한 사진 전송기 ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #fce7f3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #ec4899;
            margin-bottom: 24px;
            font-size: 24px;
        }

        .upload-box {
            border: 2px dashed #f9a8d4;
            padding: 30px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 24px;
            display: block;
        }

        .upload-box:hover {
            background-color: #fff1f2;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: #ec4899;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        #preview {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>사랑하는 아내를 위해 ❤️</h1>
    
    <label for="photoInput" class="upload-box">
        <span class="icon">📸</span>
        <span id="labelTxt">사진을 선택해 주세요</span>
        <div id="preview"></div>
    </label>
    
    <input type="file" id="photoInput" multiple accept="image/*">
    
    <button class="btn" id="sendBtn">사진 전송하기</button>
    <p class="status" id="status"></p>
</div>

<script>
    const photoInput = document.getElementById('photoInput');
    const labelTxt = document.getElementById('labelTxt');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    // 이미지 압축 함수
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; // 최대 가로 너비
                    const MAX_HEIGHT = 1200; // 최대 세로 높이
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // JPEG 화질 0.7로 압축
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                    }, 'image/jpeg', 0.7);
                };
            };
        });
    }

    photoInput.addEventListener('change', () => {
        const files = photoInput.files;
        if (files.length > 0) {
            labelTxt.textContent = `${files.length}장의 사진이 선택됨`;
            preview.innerHTML = '';
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    preview.appendChild(img);
                }
                reader.readAsDataURL(file);
            }
        }
    });

    sendBtn.addEventListener('click', async () => {
        const files = photoInput.files;
        if (files.length === 0) {
            alert('사진을 먼저 선택해 주세요!');
            return;
        }

        sendBtn.disabled = true;
        sendBtn.textContent = '용량 줄이는 중... ⏳';
        status.textContent = '빠른 전송을 위해 사진 용량을 최적화하고 있어요.';

        const formData = new FormData();
        
        // 모든 파일 압축 진행
        for (let i = 0; i < files.length; i++) {
            status.textContent = `사진 압축 중 (${i + 1}/${files.length})...`;
            const compressedFile = await compressImage(files[i]);
            formData.append('photos', compressedFile);
        }

        sendBtn.textContent = '전송 중... 🚀';
        status.textContent = '이제 네이버 메일로 순식간에 보냅니다!';

        try {
            const response = await fetch('/send-email', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.innerHTML = '전송 완료! ❤️ 사랑합니다.<br><small>(용량을 줄여서 아주 빠르게 보냈어요!)</small>';
                status.style.color = '#ec4899';
                photoInput.value = '';
                preview.innerHTML = '';
                labelTxt.textContent = '사진을 선택해 주세요';
            } else {
                const msg = await response.text();
                status.textContent = '전송 실패 😢: ' + msg;
                status.style.color = 'red';
            }
        } catch (error) {
            status.textContent = '서버 연결 오류 😢';
            status.style.color = 'red';
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = '사진 전송하기';
        }
    });
</script>

</body>
</html>
